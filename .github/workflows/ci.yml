name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm test

      # Tanpa env Supabase build berjalan dalam demo mode — ini disengaja dan
      # sudah diverifikasi lokal (build hijau tanpa .env.local).
      - run: npm run build
